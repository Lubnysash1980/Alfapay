<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>AlfaPay — Web3 Payment Gateway</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
  <div class="logo">AlfaPay</div>
  <nav>
    <a href="#home">Головна</a>
    <a href="#pay">Оплата</a>
    <a href="#status">Статус</a>
    <a href="#control">Керування</a>
  </nav>
</header>
<main>
<section id="home">
  <h1>AlfaPay — Web3 Payment Gateway</h1>
  <p>Прийом SOL та токенів AF на Solana</p>
</section>
<section id="pay">
  <h2>Оплата SOL</h2>
  <img id="payment-qr" src="payment_qr.svg" alt="Payment QR">
</section>
<section id="status">
  <h2>Статус AlfaPay</h2>
  <ul>
    <li>Google Verification: <span id="google-status">...</span></li>
    <li>QR Файл: <span id="qr-status">...</span></li>
  </ul>
</section>
<section id="control">
  <h2>Керування AlfaPay</h2>
  <p>Примусовий автозапуск: натисніть "5" у меню</p>
</section>
</main>
<footer>© 2026 AlfaPay</footer>
</body>
</html>
